<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="logo.png" alt="Mix Açaí" class="login-logo" />
      <h1 class="login-title">Mix Açaí</h1>
      <p class="login-subtitle">Entre com seu usuário e senha para acessar o sistema.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error) {
        <div class="message error" role="alert">{{ error }}</div>
      }
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          id="username"
          type="text"
          name="username"
          [(ngModel)]="username"
          class="input"
          placeholder="Digite seu usuário"
          autocomplete="username"
          autofocus
          [disabled]="loading"
        />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          class="input"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          [disabled]="loading"
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="login-hint">Demonstração: usuário <strong>mix</strong>, senha <strong>acai</strong></p>
  </div>
</div>
