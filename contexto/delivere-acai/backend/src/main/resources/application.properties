spring.application.name=acai-backend
server.port=8080

# H2 (arquivo para persistir dados entre reinicializações)
spring.datasource.url=jdbc:h2:file:./data/acaidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (em produção use variável de ambiente e secret com 32+ caracteres)
app.jwt.secret=MixAcaiSecretKeyParaDemoMinimo32Caracteres!
app.jwt.expiration-ms=86400000

# NFC-e (homologação - Bahia via SVRS)
app.nfce.habilitado=false
app.nfce.ambiente=HOMOLOGACAO
app.nfce.url-autorizacao=https://nfce-homologacao.svrs.rs.gov.br/ws/NfeAutorizacao/NFeAutorizacao4.asmx
app.nfce.certificado-path=
app.nfce.certificado-senha=
app.nfce.emitente-cnpj=
app.nfce.emitente-razao-social=MIX ACAI LTDA
app.nfce.emitente-fantasia=MIX ACAI
app.nfce.emitente-codigo-municipio=2927408
app.nfce.emitente-municipio=SALVADOR
app.nfce.emitente-uf=BA
app.nfce.emitente-ie=
app.nfce.emitente-crt=1
app.nfce.serie=1
app.nfce.proximo-numero=1

# Google Sheets API (relatório enviado para planilha online)
# Obtenha o ID na URL da planilha: https://docs.google.com/spreadsheets/d/<SPREADSHEET_ID>/edit
app.google.sheets.spreadsheet-id=12qHQMcPzE4GwDPoxfVq_3iIRhCMJ_uSS
# JSON da Service Account: use classpath: para arquivo em src/main/resources (ex.: classpath:google-service-account.json)
# ou caminho de arquivo no disco (ex.: ./config/google-service-account.json)
app.google.sheets.credentials-path=classpath:google-service-account.json
# Nome da aba da planilha onde os dados serão escritos (opcional; padrão: Relatório)
app.google.sheets.sheet-name=mix-acai
# Uma planilha por dia: cria automaticamente uma planilha nova por dia e atualiza ao longo do dia (spreadsheet-id ignorado)
app.google.sheets.uma-planilha-por-dia=true
# Planilha do caixa: uma aba por dia (evita estourar quota do Drive). Se vazio, usa spreadsheet-id. Compartilhe com o e-mail da service account.
app.google.sheets.spreadsheet-id-planilha-diaria=1bKjUlM9P-jkDcuitKIbBlEu7VZ_c2aa-WnJP1VG83K8
# Título das planilhas criadas por dia (usado no modo antigo; agora usamos uma aba por dia na planilha acima)
app.google.sheets.titulo-planilha-dia=relatorio-faturamento

# Caixa: intervalo para enviar relatório do dia para a planilha (em milissegundos; 300000 = 5 minutos)
app.caixa.intervalo-envio-planilha-ms=300000

# Gestão: usuários que podem acessar o módulo de gestão (relatórios, envio Sheets). Lista separada por vírgula, case-sensitive. Também usa o setor GESTAO do usuário no banco.
app.gestao.usuarios=paulo
app.loja.id=456

# MongoDB Atlas: sincronização de dados de gestão para o app mobile (totais, detalhes).
app.mongodb.uri=mongodb+srv://mix:GqE1JUX8h3OeW6Tj@alfatec.h8a2j5v.mongodb.net/?retryWrites=true&w=majority&authSource=admin&appName=AlfaTec
app.mongodb.database=acaigestao

# Intervalo de sincronização para o MongoDB em ms (padrão: 300000 = 5 min)
app.mongodb.sync-interval-ms=300000

# Backup do banco H2: diretório onde salvar o backup diário (caminho absoluto ou relativo ao diretório de execução).
# Uma vez ao dia o banco é salvo nesse caminho com nome acaidb-backup-AAAA-MM-DD.zip.
# Para restaurar após reinstalar: use o script restaurar-backup.bat passando o caminho do arquivo de backup.
# TESTE: pasta dentro do projeto (rode o app a partir da pasta backend para o caminho bater)
app.backup.path=C:\BACKUP
# Horário do backup diário (cron). Padrão: 2h da manhã. Em produção use ex.: 0 0 19 * * ? (19h)
# TESTE: roda 1x 10 minutos após subir a aplicação (depois pode remover ou comentar)
app.backup.test-delay-ms=3600000
app.backup.cron=0 0 19 * * ?