<div class="login-page">

  <!-- Painel esquerdo — marca -->
  <div class="brand-panel" aria-hidden="true">
    <div class="brand-glow"></div>
    <div class="brand-content">
      <img class="brand-logo" src="/assets/logo.png" alt="Espetinho Jurema" />
      <h2 class="brand-name">Espetinho Jurema</h2>
      <p class="brand-tagline">Sistema de gestão de mesas e pedidos</p>
    </div>
    <div class="brand-footer">
      <span class="dev-label">Desenvolvido por</span>
      <img class="alfatec-logo" src="/assets/logo-alfatec.jpeg" alt="AlfaTec" />
      <span class="version-label">{{ appVersionLabel }}</span>
    </div>
  </div>

  <!-- Painel direito — formulário -->
  <div class="form-panel">
    <div class="card">
      <div class="card-header">
        <div class="user-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <div>
          <h1>Bem-vindo!</h1>
          <p class="hint">Entre com seu usuário e senha para acessar.</p>
        </div>
      </div>

      <div class="field">
        <label for="lg">Login</label>
        <input
          id="lg"
          name="login"
          [(ngModel)]="login"
          autocomplete="username"
          placeholder="Seu usuário"
          (keydown.enter)="$event.preventDefault(); focarSenha(inputSenha)"
        />
      </div>
      <div class="field field-password">
        <label for="sn">Senha</label>
        <div class="password-wrap">
          <input
            id="sn"
            #inputSenha
            name="senha"
            [type]="senhaVisivel ? 'text' : 'password'"
            [(ngModel)]="senha"
            autocomplete="current-password"
            placeholder="Sua senha"
            (keydown.enter)="$event.preventDefault(); entrar()"
          />
          <button
            type="button"
            class="btn-toggle-senha"
            [attr.aria-label]="senhaVisivel ? 'Ocultar senha' : 'Mostrar senha'"
            [attr.aria-pressed]="senhaVisivel"
            (click)="alternarVisibilidadeSenha()"
          >
            @if (senhaVisivel) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      @if (erro) {
        <p class="err">{{ erro }}</p>
      }

      <button type="button" class="btn btn-primary full" [disabled]="carregando" (click)="entrar()">
        {{ carregando ? 'Entrando…' : 'Entrar' }}
      </button>

      <!-- Logo Alfatec no mobile (painel esquerdo fica escondido) -->
      <div class="alfatec-mobile">
        <span class="dev-label">Desenvolvido por</span>
        <img class="alfatec-logo-sm" src="/assets/logo-alfatec.jpeg" alt="AlfaTec" />
        <span class="version-label-mobile">{{ appVersionLabel }}</span>
      </div>
    </div>
  </div>

</div>
