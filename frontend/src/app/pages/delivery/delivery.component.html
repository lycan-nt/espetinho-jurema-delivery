<h1 class="page-title">{{ titulo }}</h1>
<p class="subtle">Pedido para entrega — lançamento rápido no celular ou no computador.</p>

<div class="form-box">
  <div class="field">
    <label for="colab">Responsável</label>
    <select id="colab" [(ngModel)]="colaboradorId" name="colab">
      @for (c of colaboradores; track c.id) {
        <option [ngValue]="c.id">{{ c.nome }}</option>
      }
    </select>
  </div>
  <div class="field">
    <label for="cli">Cliente</label>
    <select id="cli" [(ngModel)]="clienteId" name="cli">
      <option [ngValue]="null">—</option>
      @for (c of clientes; track c.id) {
        <option [ngValue]="c.id">{{ c.nome }}</option>
      }
    </select>
  </div>
  <div class="field">
    <label for="desc">Observações / endereço</label>
    <textarea id="desc" [(ngModel)]="descricao" name="desc" rows="3"></textarea>
  </div>
  <div class="field">
    <label for="pes">Pessoas / kits</label>
    <input id="pes" type="number" min="1" [(ngModel)]="pessoas" name="pes" />
  </div>
  <div class="field row">
    <label>
      <input type="checkbox" [(ngModel)]="documentoFiscal" name="nf" />
      Documento fiscal
    </label>
  </div>
  @if (erro) {
    <p class="err">{{ erro }}</p>
  }
  <button type="button" class="btn btn-primary" [disabled]="carregando" (click)="salvar()">
    Criar pedido
  </button>
</div>
